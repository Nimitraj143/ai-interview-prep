<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Result — AI Interview Prep</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F4F3;
  --surface: #ffffff;
  --teal: #0D9488;
  --teal-light: #CCFBF1;
  --teal-dark: #0F766E;
  --border: #D6D3D1;
  --muted: #A8A29E;
  --text: #44403C;
  --input-bg: #DBEAFE;
  --input-border: #93C5FD;
}
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }

.header { background: var(--surface); border-radius: 12px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border: 0.5px solid var(--border); }
.logo { font-size: 16px; font-weight: 700; color: var(--teal); }

.score-card { background: var(--surface); border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 16px; border: 0.5px solid var(--border); }
.score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--teal-light); border: 6px solid var(--teal); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 14px; }
.score-num { font-size: 30px; font-weight: 800; color: var(--teal-dark); }
.score-lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
.score-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.score-sub { font-size: 13px; color: var(--muted); }

.pills { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.pill { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.pill.green { background: #DCFCE7; color: #166534; }
.pill.yellow { background: #FEF9C3; color: #854D0E; }
.pill.gray { background: #F5F5F4; color: var(--muted); }

.section-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }

.q-result { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 10px; border: 0.5px solid var(--border); }
.q-result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.q-result-text { font-size: 13px; color: var(--text); font-weight: 600; flex: 1; line-height: 1.5; }
.score-badge { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
.score-badge.good { background: var(--teal-light); color: var(--teal-dark); }
.score-badge.ok { background: #FEF9C3; color: #854D0E; }
.score-badge.skip { background: #F5F5F4; color: var(--muted); }
.feedback { font-size: 12px; color: var(--muted); line-height: 1.6; }
.user-answer { font-size: 12px; color: #1C1917; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; padding: 8px 10px; margin-top: 8px; line-height: 1.5; }

.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn-primary { flex: 1; padding: 13px; background: var(--teal); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-primary:hover { background: var(--teal-dark); }
.btn-outline { flex: 1; padding: 13px; background: transparent; border: 1.5px solid var(--teal); color: var(--teal); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-outline:hover { background: var(--teal-light); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🤖 AI Interview Prep</div>
    <span style="font-size:13px;color:var(--muted)" id="headerMeta">Results</span>
  </div>

  <div class="score-card">
    <div class="score-circle">
      <span class="score-num" id="totalScore">--</span>
      <span class="score-lbl">/ 100</span>
    </div>
    <div class="score-title" id="scoreTitle">Calculating...</div>
    <div class="score-sub" id="scoreSub"></div>
  </div>

  <div class="pills" id="pillsRow"></div>

  <div class="section-title">Question-wise Breakdown</div>
  <div id="resultsContainer"></div>

  <div class="btn-row">
    <button class="btn-outline" onclick="window.location.href='index.html'">🔄 New Interview</button>
    <button class="btn-primary" onclick="shareResult()">📤 Share Result</button>
  </div>
</div>

<script>
const answers = JSON.parse(localStorage.getItem('interviewAnswers') || '[]');
const config = JSON.parse(localStorage.getItem('interviewConfig') || '{}');

document.getElementById('headerMeta').textContent = `${config.role || 'Developer'} • ${config.diff || 'Medium'}`;

const feedbacks = [
  "Excellent answer! Concept clearly samjha aur real example bhi diya.",
  "Good explanation. Thoda aur detail add karte toh perfect hota.",
  "Basic answer diya. Core concepts pe aur focus karo.",
  "Answer incomplete tha. Practice karo is topic pe.",
];

let totalScore = 0;
let answered = 0;
let skipped = 0;

const container = document.getElementById('resultsContainer');

answers.forEach((a, i) => {
  if (a.skipped) { skipped++; }
  else { answered++; totalScore += a.score; }

  const score = a.skipped ? 0 : a.score;
  const badgeClass = a.skipped ? 'skip' : score >= 8 ? 'good' : 'ok';
  const badgeText = a.skipped ? 'Skipped' : `${score}/10`;
  const feedback = a.skipped ? '⏭ Question skip ki gayi.' : score >= 8 ? '✅ ' + feedbacks[0] : score >= 6 ? '👍 ' + feedbacks[1] : '⚠️ ' + feedbacks[2];

  const div = document.createElement('div');
  div.className = 'q-result';
  div.innerHTML = `
    <div class="q-result-top">
      <span class="q-result-text">Q${i+1}: ${a.question}</span>
      <span class="score-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="feedback">${feedback}</div>
    ${a.answer ? `<div class="user-answer">${a.answer.substring(0, 200)}${a.answer.length > 200 ? '...' : ''}</div>` : ''}
  `;
  container.appendChild(div);
});

const finalScore = answered > 0 ? Math.round((totalScore / answered) * 10) : 0;
document.getElementById('totalScore').textContent = finalScore;

const titles = finalScore >= 80 ? ['Excellent Performance! 🎉', 'Bahut acha kiya!'] :
               finalScore >= 60 ? ['Solid Performance! 👍', 'Aur practice se aur better hoga!'] :
               ['Keep Practicing! 💪', 'Har attempt mein improve hota hai!'];
document.getElementById('scoreTitle').textContent = titles[0];
document.getElementById('scoreSub').textContent = titles[1];

const partial = answers.filter(a => !a.skipped && a.score < 8).length;
document.getElementById('pillsRow').innerHTML = `
  <span class="pill green">✅ ${answered} Answered</span>
  ${partial > 0 ? `<span class="pill yellow">⚠️ ${partial} Partial</span>` : ''}
  ${skipped > 0 ? `<span class="pill gray">⏭ ${skipped} Skipped</span>` : ''}
`;

function shareResult() {
  const text = `AI Interview Prep mein mujhe ${finalScore}/100 score mila! Role: ${config.role || 'Developer'} 🚀`;
  if (navigator.share) { navigator.share({ title: 'My Interview Result', text }); }
  else { navigator.clipboard.writeText(text); alert('Result copied to clipboard!'); }
}
</script>
</body>
</html>
