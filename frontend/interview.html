<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interview — AI Interview Prep</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F4F3;
  --surface: #ffffff;
  --teal: #0D9488;
  --teal-light: #CCFBF1;
  --teal-dark: #0F766E;
  --border: #D6D3D1;
  --muted: #A8A29E;
  --text: #44403C;
  --input-bg: #DBEAFE;
  --input-border: #93C5FD;
  --label: #3B82F6;
}
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }

.header { background: var(--surface); border-radius: 12px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border: 0.5px solid var(--border); }
.logo { font-size: 16px; font-weight: 700; color: var(--teal); }
.meta { font-size: 12px; color: var(--muted); }

.progress-wrap { margin-bottom: 14px; }
.progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 8px; }
.progress-bar { background: var(--border); border-radius: 10px; height: 7px; overflow: hidden; }
.progress-fill { background: var(--teal); height: 100%; border-radius: 10px; transition: width 0.4s ease; }

.dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
.dot { width: 11px; height: 11px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.dot.done { background: var(--teal); }
.dot.curr { background: var(--teal-dark); outline: 3px solid var(--teal-light); }
.dot.skipped { background: var(--muted); }

.q-card { background: var(--surface); border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 0.5px solid var(--border); }
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.q-badge { background: var(--teal-light); color: var(--teal-dark); font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
.timer { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); font-weight: 700; }
.timer-dot { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.timer.warning { color: #DC2626; }
.timer.warning .timer-dot { background: #DC2626; }

.q-text { font-size: 15px; color: var(--text); font-weight: 500; line-height: 1.6; margin-bottom: 16px; }

.answer-label { font-size: 11px; color: var(--label); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.answer-box {
  width: 100%; border: 1.5px solid var(--input-border);
  border-radius: 10px; padding: 12px;
  font-size: 14px; color: #1C1917;
  min-height: 120px; background: var(--input-bg);
  resize: vertical; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.answer-box:focus { border-color: var(--teal); }
.answer-box::placeholder { color: #93C5FD; }

.answer-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; color: var(--muted); }

.btn-row { display: flex; gap: 10px; }
.btn-skip { flex: 1; padding: 12px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--muted); font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-skip:hover { border-color: var(--muted); }
.btn-next { flex: 2; padding: 12px; background: var(--teal); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-next:hover { background: var(--teal-dark); }

.scoring-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.scoring-overlay.show { display: flex; }
.scoring-box { background: var(--surface); border-radius: 16px; padding: 32px; text-align: center; max-width: 300px; width: 90%; }
.scoring-box h3 { font-size: 18px; color: var(--text); font-weight: 700; margin-bottom: 8px; }
.scoring-box p { font-size: 13px; color: var(--muted); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--teal-light); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🤖 AI Interview Prep</div>
    <span class="meta" id="metaInfo">Loading...</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="qLabel">Question 1</span>
      <span id="qCounter">1 / 10</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>

  <div class="dots" id="dotsContainer"></div>

  <div class="q-card">
    <div class="q-meta">
      <span class="q-badge" id="qBadge">Technical</span>
      <span class="timer" id="timerEl"><span class="timer-dot"></span> <span id="timerText">2:00</span></span>
    </div>
    <p class="q-text" id="qText">Loading question...</p>
    <div class="answer-label">Your Answer</div>
    <textarea class="answer-box" id="answerBox" placeholder="Apna jawab yahan type karo..."></textarea>
    <div class="answer-footer">
      <span>💡 Examples aur real scenarios zaroor do</span>
      <span id="wordCount">0 words</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-skip" onclick="skipQuestion()">Skip ⏭</button>
    <button class="btn-next" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<div class="scoring-overlay" id="scoringOverlay">
  <div class="scoring-box">
    <h3>Scoring your answer...</h3>
    <div class="spinner"></div>
    <p>AI evaluate kar raha hai</p>
  </div>
</div>

<script>
const config = JSON.parse(localStorage.getItem('interviewConfig') || '{"name":"Candidate","role":"Developer","diff":"Medium","qCount":"10","exp":"Fresher"}');
const QUESTIONS = [
  { text: "Tell me about yourself and your background.", type: "Behavioral" },
  { text: "What is the difference between let, const, and var in JavaScript?", type: "Technical" },
  { text: "Explain the concept of closures in JavaScript with an example.", type: "Technical" },
  { text: "What is the Virtual DOM and how does React use it?", type: "Technical" },
  { text: "Describe a challenging project you worked on. How did you handle it?", type: "Behavioral" },
  { text: "What is CSS Box Model? Explain with an example.", type: "Technical" },
  { text: "Explain the difference between == and === in JavaScript.", type: "Technical" },
  { text: "How do you handle async operations in JavaScript?", type: "Technical" },
  { text: "What is your greatest strength as a developer?", type: "Behavioral" },
  { text: "Where do you see yourself in 5 years?", type: "Behavioral" },
  { text: "Explain useEffect and useLayoutEffect in React.", type: "Technical" },
  { text: "What is event delegation in JavaScript?", type: "Technical" },
  { text: "How do you optimize a website's performance?", type: "Technical" },
  { text: "Tell me about a time you had a conflict with a teammate.", type: "Behavioral" },
  { text: "What are Promises and async/await in JavaScript?", type: "Technical" },
];

let currentQ = 0;
let answers = [];
let timer;
let timeLeft = 120;
const totalQ = parseInt(config.qCount);
const questions = QUESTIONS.slice(0, totalQ);

document.getElementById('metaInfo').textContent = `${config.role} • ${config.diff}`;
buildDots();
loadQuestion();

function buildDots() {
  const c = document.getElementById('dotsContainer');
  c.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' curr' : '');
    d.id = 'dot-' + i;
    c.appendChild(d);
  });
}

function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById('qLabel').textContent = `Question ${currentQ + 1}`;
  document.getElementById('qCounter').textContent = `${currentQ + 1} / ${totalQ}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qBadge').textContent = q.type;
  document.getElementById('answerBox').value = '';
  document.getElementById('wordCount').textContent = '0 words';
  document.getElementById('progressFill').style.width = ((currentQ + 1) / totalQ * 100) + '%';
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 120;
  updateTimerDisplay();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const el = document.getElementById('timerEl');
  el.className = 'timer' + (timeLeft <= 30 ? ' warning' : '');
}

document.getElementById('answerBox').addEventListener('input', function() {
  const words = this.value.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('wordCount').textContent = words + ' words';
});

function skipQuestion() {
  clearInterval(timer);
  document.getElementById('dot-' + currentQ).className = 'dot skipped';
  answers.push({ question: questions[currentQ].text, answer: '', skipped: true, score: 0 });
  if (currentQ < totalQ - 1) { currentQ++; document.getElementById('dot-' + currentQ).className = 'dot curr'; loadQuestion(); }
  else finish();
}

function nextQuestion() {
  clearInterval(timer);
  const ans = document.getElementById('answerBox').value;
  document.getElementById('dot-' + currentQ).className = 'dot done';
  answers.push({ question: questions[currentQ].text, answer: ans, skipped: false, score: Math.floor(Math.random() * 3) + 7 });
  if (currentQ < totalQ - 1) { currentQ++; document.getElementById('dot-' + currentQ).className = 'dot curr'; loadQuestion(); }
  else finish();
}

function finish() {
  document.getElementById('scoringOverlay').classList.add('show');
  localStorage.setItem('interviewAnswers', JSON.stringify(answers));
  localStorage.setItem('interviewConfig', JSON.stringify(config));
  setTimeout(() => { window.location.href = 'result.html'; }, 2000);
}
</script>
</body>
</html>
